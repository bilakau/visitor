<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Realtime Counter</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: #050505; color: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; text-align: center; }
        .container { border: 1px solid rgba(255, 255, 255, 0.1); padding: 50px 80px; border-radius: 30px; background: #000; }
        h1 { font-size: 0.9rem; letter-spacing: 4px; text-transform: uppercase; color: #555; margin-bottom: 15px; }
        .counter { font-size: 7rem; font-weight: 900; transition: 0.3s; }
        .counter.up { transform: scale(1.1); color: #aaa; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Total Views</h1>
        <div class="counter" id="count">0</div>
    </div>

    <script>
        // OTOMATIS MENGGUNAKAN DOMAIN TEMPAT FILE INI BERADA
        const API = window.location.origin; 
        const el = document.getElementById('count');
        let current = 0;

        function update(val) {
            if (val > current && current !== 0) {
                el.classList.add('up');
                setTimeout(() => el.classList.remove('up'), 200);
            }
            current = val;
            el.innerText = val.toLocaleString('id-ID');
        }

        async function init() {
            try {
                // Mencatat kunjungan baru (Refresh = +1)
                const res = await fetch(`${API}/visit`, { method: 'POST' });
                const data = await res.json();
                update(data.views);
            } catch (e) { console.error(e); }
        }

        async function sync() {
            try {
                // Ambil data terbaru (Realtime sync)
                const res = await fetch(`${API}/views`);
                const data = await res.json();
                update(data.views);
            } catch (e) { console.error(e); }
        }

        window.onload = () => {
            init();
            setInterval(sync, 3000); // Sinkronisasi setiap 3 detik
        };
    </script>
</body>
</html>
