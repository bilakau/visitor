<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Realtime Counter | Minimalist</title>
    
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;600;900&display=swap" rel="stylesheet">
    
    <style>
        /* CSS RESET */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        /* BODY SETUP - TEMA HITAM PEKAT */
        body {
            background-color: #050505; 
            color: #ffffff; 
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            overflow: hidden;
        }

        /* CONTAINER UTAMA */
        .container {
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 60px 80px;
            border-radius: 30px;
            background: linear-gradient(145deg, #0a0a0a, #000000);
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.9);
            position: relative;
            z-index: 1;
        }

        /* EFEK GLOW HALUS DI BELAKANG */
        .container::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            border-radius: 30px;
            box-shadow: inset 0 0 20px rgba(255, 255, 255, 0.02);
            z-index: -1;
            pointer-events: none;
        }

        /* JUDUL ATAS */
        h1 {
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 6px;
            text-transform: uppercase;
            color: #555;
            margin-bottom: 25px;
        }

        /* ANGKA COUNTER */
        .counter {
            font-size: 8rem;
            font-weight: 900;
            letter-spacing: -4px;
            display: inline-block;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            line-height: 1;
        }

        /* ANIMASI SAAT ANGKA BERUBAH */
        .counter.pulse {
            transform: scale(1.1);
            color: #888;
            text-shadow: 0 0 30px rgba(255, 255, 255, 0.2);
        }

        /* FOOTER KETERANGAN */
        .footer {
            margin-top: 50px;
            font-size: 0.7rem;
            color: #333;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        /* RESPONSIVE UNTUK LAYAR KECIL (HP) */
        @media (max-width: 600px) {
            .container { padding: 50px 30px; width: 85%; }
            .counter { font-size: 5rem; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Total Page Views</h1>
        <!-- Tempat angka muncul -->
        <div class="counter" id="viewCount">0</div>
    </div>
    
    <div class="footer">
        Realtime Sync • Edge Network • MongoDB
    </div>

    <script>
        // MENGGUNAKAN WINDOW.LOCATION.ORIGIN (Otomatis deteksi URL Worker kamu)
        const API_URL = window.location.origin; 
        
        const countDisplay = document.getElementById('viewCount');
        let currentVal = 0;

        // FUNGSI: Memperbarui tampilan angka dengan animasi
        function updateDisplay(newVal) {
            // Animasi hanya jika angka bertambah
            if (newVal > currentVal && currentVal !== 0) {
                countDisplay.classList.add('pulse');
                setTimeout(() => countDisplay.classList.remove('pulse'), 300);
            }
            currentVal = newVal;
            // Format angka ribuan dengan titik (contoh: 1.250)
            countDisplay.innerText = newVal.toLocaleString('id-ID');
        }

        // FUNGSI: Mencatat kunjungan (Hitung +1 setiap kali refresh)
        async function recordVisit() {
            try {
                const response = await fetch(`${API_URL}/visit`, { 
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' }
                });
                const data = await response.json();
                if (data.views) updateDisplay(data.views);
            } catch (err) {
                console.error("Gagal mencatat kunjungan:", err);
                countDisplay.innerText = "Error";
            }
        }

        // FUNGSI: Mengambil data terbaru secara realtime (Polling)
        async function fetchRealtimeData() {
            try {
                const response = await fetch(`${API_URL}/views`);
                const data = await response.json();
                if (data.views) updateDisplay(data.views);
            } catch (err) {
                console.error("Gagal sinkronisasi data:", err);
            }
        }

        // JALANKAN SAAT HALAMAN DIMUAT
        window.onload = () => {
            // 1. Catat kunjungan (tambah +1 di database)
            recordVisit();
            
            // 2. Cek data terbaru setiap 3 detik (Sync dengan user lain)
            setInterval(fetchRealtimeData, 1000); 
        };
    </script>

</body>
</html>
